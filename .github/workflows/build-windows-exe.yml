name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build UAVMissionPlanner.exe
        run: pyinstaller desktop/build.spec --noconfirm

      - name: Zip the app folder
        run: Compress-Archive -Path dist/UAVMissionPlanner -DestinationPath UAVMissionPlanner-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: UAVMissionPlanner-windows
          path: UAVMissionPlanner-windows.zip
